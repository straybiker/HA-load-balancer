title: EV Load Balancer Logic
views:
  - title: Logic
    path: ev-loadbalancer-logic
    icon: mdi:ev-station
    cards:
      - type: markdown
        title: Live Decision Summary
        content: |
          {% set household_power = states('sensor.ev_load_balancer_house') | int(0) %}
          {% set charger_current_input = state_attr('sensor.ev_load_balancer_charger','current_input') | float(0) %}
          {% set charger_power = state_attr('sensor.ev_load_balancer_charger','active_power') | float(0) %}
          {% set charger_phases_input = state_attr('sensor.ev_load_balancer_charger','phases_input') %}
          {% set grid_power_limit = state_attr('sensor.ev_load_balancer','power_limit') | int(0) %}
          {% set nominal_voltage = state_attr('sensor.ev_load_balancer_charger','nominal_voltage') | int(230) %}
          {% set phase_3 = state_attr('sensor.ev_load_balancer_charger', 'phase_3_state') | default('3 Phases', true) %}
          {% set selected_mode = states('sensor.ev_load_balancer') %}
          {% set configured_car_aware = state_attr('sensor.ev_load_balancer', 'car_aware') | bool %}
          {% set car_valid = configured_car_aware and state_attr('sensor.ev_load_balancer_car','battery_capacity_wh') not in ['unavailable', 'unknown', none, 'none', 'None', ''] and state_attr('sensor.ev_load_balancer_car','battery_percentage') not in ['unavailable', 'unknown', none, 'none', 'None', ''] %}
          {% set car_aware = car_valid %}
          {% set charger_max = state_attr('sensor.ev_load_balancer_charger', 'max_current') | int(0) %}
          {% set car_max = state_attr('sensor.ev_load_balancer_car', 'max_current') | int(0) %}
          {% set max_current = [car_max, charger_max] | min if car_aware else charger_max %}
          {% set charger_min = state_attr('sensor.ev_load_balancer_charger', 'min_current') | float(6) %}
          {% set car_min = state_attr('sensor.ev_load_balancer_car', 'min_current') | float(6) %}
          {% set min_current = [car_min, charger_min] | max if car_aware else charger_min %}
          {% set p_min_1 = min_current * nominal_voltage %}
          {% set p_min_3 = min_current * nominal_voltage * 3 %}
          {% set p_fast = max_current * nominal_voltage * 3 %}
          {% set phase_count = 3 if charger_phases_input == phase_3 else 1 %}
          {% if charger_current_input > 0 and charger_power > 1000 %}
            {% set charger_efficiency = [charger_power / (charger_current_input * nominal_voltage * phase_count), 1.0] | min %}
          {% else %}
            {% set charger_efficiency = 1.0 %}
          {% endif %}
          {% set current_rate = state_attr('sensor.ev_load_balancer', 'electricity_price') | float(0) %}
          {% set max_cost_rate = state_attr('sensor.ev_load_balancer', 'max_cost_rate') | float(0.30) %}
          {% set ems_active = state_attr('sensor.ev_load_balancer', 'ems_control') | bool %}
          {% set ems_signal_power = state_attr('sensor.ev_load_balancer', 'ems_signal') | float(0) %}
          {% set ems_signal = ems_signal_power > 0 %}
          {% set ems_as_onoff = state_attr('sensor.ev_load_balancer', 'ems_as_onoff') | bool %}
          {% set current_soc = state_attr('sensor.ev_load_balancer_car', 'battery_percentage') | int(100) %}
          {% set emergency_soc = state_attr('sensor.ev_load_balancer', 'emergency_soc') | int(20) %}
          {% set comfort_soc = state_attr('sensor.ev_load_balancer', 'comfort_soc') | int(50) %}
          {% set target_soc = state_attr('sensor.ev_load_balancer', 'target_soc') | int(80) %}
          {% set is_emergency = current_soc < emergency_soc %}
          {% set target_reached = car_aware and current_soc >= target_soc %}
          {% set price_ok = current_rate <= max_cost_rate %}
          {% set signal_ok = (not ems_active) or ems_signal %}
          {% set grid_gate_open = true if is_emergency else (price_ok and signal_ok) %}
          {% if selected_mode == 'Off' %}
            {% set desired_grid_w = 0 %}
          {% elif is_emergency %}
            {% set desired_grid_w = grid_power_limit %}
          {% elif target_reached %}
            {% set desired_grid_w = 0 %}
          {% elif not grid_gate_open %}
            {% set desired_grid_w = 0 %}
          {% elif selected_mode == '1-Phase Minimum' %}
            {% set desired_grid_w = p_min_1 %}
          {% elif selected_mode == '3-Phases Minimum' %}
            {% set desired_grid_w = p_min_3 %}
          {% elif selected_mode == 'Fast' %}
            {% set desired_grid_w = p_fast %}
          {% elif selected_mode == 'Limited' %}
            {% set desired_grid_w = grid_power_limit %}
          {% elif selected_mode == 'Comfort' %}
            {% set desired_grid_w = grid_power_limit if current_soc < comfort_soc else 0 %}
          {% elif selected_mode == 'Solar' %}
            {% set desired_grid_w = 0 %}
          {% else %}
            {% set desired_grid_w = 0 %}
          {% endif %}
          {% if is_emergency %}
            {% set effective_grid_w = desired_grid_w %}
          {% elif selected_mode == 'Solar' %}
            {% set effective_grid_w = 0 %}
          {% elif ems_active and not ems_as_onoff %}
            {% set effective_grid_w = [desired_grid_w, ems_signal_power] | min %}
          {% else %}
            {% set effective_grid_w = desired_grid_w %}
          {% endif %}
          {% set pv_prioritized = state_attr('sensor.ev_load_balancer', 'pv_prioritized') | bool %}
          {% set pv_prio_threshold = state_attr('sensor.ev_load_balancer', 'pv_prio_threshold') | float(0) %}
          {% set base_surplus = -household_power %}
          {% if base_surplus < p_min_1 %}
            {% set solar_surplus = [base_surplus + pv_prio_threshold, 0] | max %}
          {% else %}
            {% set solar_surplus = base_surplus %}
          {% endif %}
          {% if selected_mode == 'Off' %}
            {% set raw_target_power = 0 %}
          {% elif ems_active and not ems_signal %}
            {% set raw_target_power = 0 %}
          {% elif target_reached %}
            {% set raw_target_power = 0 %}
          {% elif selected_mode == 'Limited' and pv_prioritized and solar_surplus > 0 %}
            {% set raw_target_power = solar_surplus %}
          {% else %}
            {% set raw_target_power = effective_grid_w + solar_surplus %}
          {% endif %}
          {% set grid_headroom = grid_power_limit - household_power %}
          {% set max_hardware = max_current * nominal_voltage * 3 %}
          {% set eff = [charger_efficiency, 0.1] | max %}
          {% set raw_target_eff = raw_target_power / eff %}
          {% set headroom_adjusted = grid_headroom / charger_efficiency if grid_headroom > 0 else 0 %}
          {% set adjusted_available_power_final = [raw_target_eff, headroom_adjusted, max_hardware] | min %}
          {% set power_limit_is_cap = raw_target_eff > headroom_adjusted and headroom_adjusted <= max_hardware %}
          {% set force_single = state_attr('sensor.ev_load_balancer', 'single_phase_only') | bool %}
          {% if selected_mode == '1-Phase Minimum' %}
            {% set desired_phase = 1 %}
          {% elif selected_mode == '3-Phases Minimum' %}
            {% set desired_phase = 3 %}
          {% elif force_single %}
            {% set desired_phase = 1 %}
          {% elif adjusted_available_power_final >= p_min_3 %}
            {% set desired_phase = 3 %}
          {% else %}
            {% set desired_phase = 1 %}
          {% endif %}
          {% set current_phase = 3 if states(state_attr('sensor.ev_load_balancer_charger','phases_output')) == phase_3 else 1 %}
          {% set phase_timer_active = is_state('timer.ev_load_balancer_phase_switching_timer', 'active') %}
          {% set adjusted_phase_selection = current_phase if desired_phase > current_phase and phase_timer_active else desired_phase %}
          {% set calculated_current = (adjusted_available_power_final / (nominal_voltage * adjusted_phase_selection)) | round(1) %}
          {% if calculated_current < min_current %}
            {% set adjusted_current_limit = 0 %}
          {% elif calculated_current > max_current %}
            {% set adjusted_current_limit = max_current %}
          {% else %}
            {% set adjusted_current_limit = calculated_current %}
          {% endif %}
          {% set target_power = adjusted_current_limit * nominal_voltage * adjusted_phase_selection %}

          # EV Load Balancer

          **Decision:** set charger to **{{ adjusted_current_limit }} A** on **{{ adjusted_phase_selection }} phase{{ 's' if adjusted_phase_selection == 3 else '' }}**,
          about **{{ target_power | round(0) }} W**.

          | Item | Live value |
          |---|---:|
          | Mode | {{ selected_mode }} |
          | Charger connection | {{ state_attr('sensor.ev_load_balancer_charger','connection_state') }} |
          | Current charger power | {{ charger_power | round(0) }} W |
          | Applied current | {{ charger_current_input }} A |
          | Applied phases | {{ charger_phases_input }} |
          | Configured power limit | {{ grid_power_limit }} W |
          | Household net power | {{ household_power }} W |
          | Remaining headroom under limit | {{ grid_headroom | round(0) }} W |
          | Solar surplus used by logic | {{ solar_surplus | round(0) }} W |
          | Raw target power | {{ raw_target_power | round(0) }} W |
          | Final available power | {{ adjusted_available_power_final | round(0) }} W |
          | Power-limit protection | {{ 'Active: output is capped to stay below power_limit' if power_limit_is_cap else 'Not the active cap right now' }} |
          | Current limit result | {{ adjusted_current_limit }} A |
          | Phase result | {{ adjusted_phase_selection }} |
          | Charger efficiency | {{ (charger_efficiency * 100) | round(1) }} % |

          {% if adjusted_current_limit == 0 and selected_mode == '3-Phases Minimum' and grid_headroom < p_min_3 %}
          **Why charging is stopped:** 3-Phases Minimum needs about {{ p_min_3 | round(0) }} W of headroom, but only {{ grid_headroom | round(0) }} W is available under the configured power limit. It stops instead of exceeding the capaciteitspiek or falling back to 1 phase.
          {% elif adjusted_current_limit == 0 and selected_mode == '1-Phase Minimum' and grid_headroom < p_min_1 %}
          **Why charging is stopped:** 1-Phase Minimum needs about {{ p_min_1 | round(0) }} W of headroom, but only {{ grid_headroom | round(0) }} W is available under the configured power limit. It stops instead of exceeding the capaciteitspiek.
          {% elif adjusted_current_limit == 0 %}
          **Why charging is stopped:** available power is below the minimum current of {{ min_current }} A, the mode is off, EMS/price blocked charging, or the target SOC has been reached.
          {% elif power_limit_is_cap %}
          **Main cap:** the configured power limit is active. The charger output is clipped to the remaining headroom under the capaciteitspiek, including in {{ selected_mode }} mode.
          {% elif target_power < raw_target_power %}
          **Main cap:** requested power is higher than the physical/grid/hardware limit after efficiency compensation.
          {% elif selected_mode == 'Limited' and pv_prioritized and solar_surplus > 0 %}
          **Solar priority is active:** Limited mode is using solar surplus only while sun is available.
          {% elif force_single %}
          **Single phase only is active:** the charger will not switch to 3 phases even if more power is available.
          {% elif phase_timer_active and desired_phase == 3 and current_phase == 1 %}
          **Phase timer is active:** the charger is waiting before switching back to 3 phases.
          {% else %}
          **No obvious cap from this view:** the selected output follows the current calculation.
          {% endif %}

      - type: entities
        title: Controls
        show_header_toggle: false
        entities:
          - input_select.ev_load_balancer_charge_mode
          - input_number.ev_load_balancer_power_limit
          - input_boolean.ev_load_balancer_pv_prioritized
          - input_number.ev_load_balancer_pv_prio_threshold
          - input_boolean.ev_load_balancer_single_phase_only
          - input_boolean.ev_load_balancer_car_aware
          - input_boolean.ev_load_balancer_ems_control
          - input_boolean.ev_load_balancer_ems_as_onoff
          - input_number.ev_max_charging_cost
          - input_number.ev_load_balancer_emergency_soc
          - input_number.ev_load_balancer_comfort_soc
          - input_number.ev_load_balancer_target_soc

      - type: markdown
        title: Logic Manual With Live Inputs
        content: |
          {% set mode = states('sensor.ev_load_balancer') %}
          {% set household = states('sensor.ev_load_balancer_house') | int(0) %}
          {% set pv = state_attr('sensor.ev_load_balancer_house', 'pv_power') | float(0) %}
          {% set limit = state_attr('sensor.ev_load_balancer', 'power_limit') | int(0) %}
          {% set charger_min = state_attr('sensor.ev_load_balancer_charger', 'min_current') | float(6) %}
          {% set car_min = state_attr('sensor.ev_load_balancer_car', 'min_current') | float(6) %}
          {% set car_aware = state_attr('sensor.ev_load_balancer', 'car_aware') | bool %}
          {% set min_current = [charger_min, car_min] | max if car_aware else charger_min %}
          {% set voltage = state_attr('sensor.ev_load_balancer_charger','nominal_voltage') | int(230) %}
          {% set p_min_1 = min_current * voltage %}
          {% set p_min_3 = min_current * voltage * 3 %}

          ## What The Package Does

          Every 10 seconds the automation reads the household net power,
          charger state, car limits, price/EMS guards, and selected mode. It
          then calculates a target power, chooses 1 or 3 phases, and converts
          the result to an amp limit for the charger.

          The household sensor should be **net household power excluding the
          charger**. Negative means export/surplus. Current value:
          **{{ household }} W**. PV production attribute:
          **{{ pv | round(0) }} W**.

          ## Minimum Charging Steps

          | Step | Meaning | Live value |
          |---|---|---:|
          | 1 phase minimum | {{ min_current }} A x {{ voltage }} V | {{ p_min_1 | round(0) }} W |
          | 3 phase minimum | {{ min_current }} A x {{ voltage }} V x 3 | {{ p_min_3 | round(0) }} W |
          | Power limit | Household + charging cap | {{ limit }} W |

          ## Capacity Peak Rule

          During normal load-balancer calculation, the configured **Power
          limit** is applied as the household + charging cap. `Fast`,
          `1-Phase Minimum`, and `3-Phases Minimum` are target requests; the
          final charger current is still clipped to the remaining headroom
          under that cap.

          If the car appears to stick near **4 kW**, that often means it is at
          the 3 phase minimum: {{ p_min_3 | round(0) }} W. To go higher, the
          final available power must exceed that minimum enough to request more
          than {{ min_current }} A on 3 phases.

          ## Mode Behavior

          | Mode | Behavior |
          |---|---|
          | Off | Sets current to 0 A. |
          | 1-Phase Minimum | Requests minimum current on 1 phase, still capped by the configured power limit. |
          | 3-Phases Minimum | Requests minimum current on 3 phases, still capped by the configured power limit. If there is not enough headroom, it stops instead of exceeding the cap or falling back to 1 phase. |
          | Limited | Uses the configured power limit and adds solar surplus unless PV priority changes that behavior. |
          | Fast | Requests hardware maximum current on 3 phases, then clips output to the remaining headroom under the configured power limit. |
          | Solar | Uses solar surplus only; no grid power is requested. |
          | Comfort | Limited below comfort SOC, solar-like above comfort SOC. |

          Current mode: **{{ mode }}**.

      - type: markdown
        title: Guards And Constraints
        content: |
          {% set current_rate = state_attr('sensor.ev_load_balancer', 'electricity_price') | float(0) %}
          {% set max_cost_rate = state_attr('sensor.ev_load_balancer', 'max_cost_rate') | float(0.30) %}
          {% set ems_active = state_attr('sensor.ev_load_balancer', 'ems_control') | bool %}
          {% set ems_signal_power = state_attr('sensor.ev_load_balancer', 'ems_signal') | float(0) %}
          {% set ems_signal = ems_signal_power > 0 %}
          {% set ems_as_onoff = state_attr('sensor.ev_load_balancer', 'ems_as_onoff') | bool %}
          {% set soc = state_attr('sensor.ev_load_balancer_car', 'battery_percentage') | int(100) %}
          {% set emergency_soc = state_attr('sensor.ev_load_balancer', 'emergency_soc') | int(20) %}
          {% set comfort_soc = state_attr('sensor.ev_load_balancer', 'comfort_soc') | int(50) %}
          {% set target_soc = state_attr('sensor.ev_load_balancer', 'target_soc') | int(80) %}
          {% set car_aware = state_attr('sensor.ev_load_balancer', 'car_aware') | bool %}
          {% set target_reached = car_aware and soc >= target_soc %}
          {% set price_ok = current_rate <= max_cost_rate %}
          {% set signal_ok = (not ems_active) or ems_signal %}
          {% set emergency = soc < emergency_soc %}

          ## Live Guards

          | Guard | Live value | Effect |
          |---|---:|---|
          | Price | {{ current_rate }} / max {{ max_cost_rate }} | {{ 'Allows grid charging' if price_ok else 'Blocks grid charging' }} |
          | EMS active | {{ ems_active }} | {{ 'EMS participates' if ems_active else 'EMS ignored' }} |
          | EMS signal | {{ ems_signal_power }} W | {{ 'Allows grid charging' if signal_ok else 'Blocks grid charging' }} |
          | EMS as on/off | {{ ems_as_onoff }} | {{ 'Signal is binary' if ems_as_onoff else 'Signal is a watt budget' }} |
          {% if car_aware %}
          | Car SOC | {{ soc }} % | Emergency below {{ emergency_soc }} %, comfort below {{ comfort_soc }} %, stop at {{ target_soc }} % when car-aware |
          | Emergency override | {{ emergency }} | {{ 'Bypasses EMS/price and charges up to power limit' if emergency else 'Normal guard logic applies' }} |
          | Target reached | {{ target_reached }} | {{ 'Charging target reached' if target_reached else 'Target not reached or car-aware off' }} |
          {% else %}
          | Car awareness | Off | SOC guards are disabled |
          {% endif %}

          ## Timers

          | Timer | State |
          |---|---:|
          | Phase switch delay | {{ states('timer.ev_load_balancer_phase_switching_timer') }} |
          | Sensor grace period | {{ states('timer.ev_load_balancer_sensor_grace_period') }} |

      - type: markdown
        title: Sensor Map
        content: |
          ## Configured Entities

          | Role | Entity/value |
          |---|---|
          | House net sensor | `sensor.ev_load_balancer_house` = {{ states('sensor.ev_load_balancer_house') }} W |
          | PV power attribute | {{ state_attr('sensor.ev_load_balancer_house', 'pv_power') }} W |
          | Charger active power | {{ state_attr('sensor.ev_load_balancer_charger','active_power') }} W |
          | Charger current input | {{ state_attr('sensor.ev_load_balancer_charger','current_input') }} A |
          | Charger current output entity | `{{ state_attr('sensor.ev_load_balancer_charger','current_output') }}` = {{ states(state_attr('sensor.ev_load_balancer_charger','current_output')) }} A |
          | Charger phase input | {{ state_attr('sensor.ev_load_balancer_charger','phases_input') }} |
          | Charger phase output entity | `{{ state_attr('sensor.ev_load_balancer_charger','phases_output') }}` = {{ states(state_attr('sensor.ev_load_balancer_charger','phases_output')) }} |
          | Charger max current | {{ state_attr('sensor.ev_load_balancer_charger','max_current') }} A |
          | Car max current | {{ state_attr('sensor.ev_load_balancer_car','max_current') }} A |
          | Car battery | {{ state_attr('sensor.ev_load_balancer_car','battery_percentage') }} % |

          ## Required Sensor Health

          {% set base_sensors = [
            states('sensor.ev_load_balancer_house'),
            state_attr('sensor.ev_load_balancer_charger','current_input'),
            state_attr('sensor.ev_load_balancer_charger','active_power'),
            state_attr('sensor.ev_load_balancer_charger','phases_input')
          ] %}
          {% set invalid = base_sensors | select('in', ['unavailable', 'unknown', none, 'none', 'None', '']) | list %}
          {% if invalid | count > 0 %}
          **Problem:** one or more required base values is unavailable. The package may fall back to default charger values.
          {% else %}
          **Base sensors look usable.**
          {% endif %}

      - type: history-graph
        title: Recent Power And Current
        hours_to_show: 4
        entities:
          - sensor.ev_load_balancer_house
          - sensor.ev_load_balancer_pv_power
          - sensor.ev_load_balancer_charger_active_power
          - sensor.ev_load_balancer_charger_applied_current
